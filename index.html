    <!-- Deferred Google Analytics — loads after page is fully rendered -->
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-J8M6GLFE3R';
          s.async = true;
          document.head.appendChild(s);
          s.onload = function () {
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-J8M6GLFE3R');
          };
        }, 3500);
      });
    </script>
